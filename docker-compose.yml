services:
  map:
    build:
      context: .
    image: osm-tile-server:local
    volumes:
      - osm-data:/data/database/
      - osm-tiles:/data/tiles/
    ports:
      - "8080:80"
    command: "run"

volumes:
  osm-data:
    external: true
    name: osm-data
  osm-tiles:
    external: true
    name: osm-tiles
